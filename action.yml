name: "X-Ray LLM Scan"
description: "Run X-Ray code quality scan on your repository"
author: "X-Ray LLM"

inputs:
  path:
    description: "Path to scan (relative to repo root)"
    required: false
    default: "."
  severity:
    description: "Minimum severity to report (LOW, MEDIUM, HIGH)"
    required: false
    default: "MEDIUM"
  format:
    description: "Output format (text, json, sarif)"
    required: false
    default: "sarif"
  fix:
    description: "Attempt auto-fixes"
    required: false
    default: "false"

outputs:
  findings:
    description: "Number of findings"
    value: ${{ steps.scan.outputs.findings }}
  report:
    description: "Path to the output report file"
    value: ${{ steps.scan.outputs.report }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install X-Ray
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run scan
      id: scan
      shell: bash
      run: |
        REPORT_PATH="xray-results.${{ inputs.format == 'sarif' && 'sarif' || inputs.format }}"
        ARGS="${{ inputs.path }} --severity ${{ inputs.severity }} --format ${{ inputs.format }} -o $REPORT_PATH"
        if [ "${{ inputs.fix }}" = "true" ]; then
          ARGS="$ARGS --fix"
        fi
        python -m xray $ARGS
        COUNT=$(python -c "import json; d=json.load(open('$REPORT_PATH')); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "0")
        echo "findings=$COUNT" >> $GITHUB_OUTPUT
        echo "report=$REPORT_PATH" >> $GITHUB_OUTPUT

    - name: Upload SARIF
      if: inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.report }}
