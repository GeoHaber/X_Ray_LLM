<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>X-RAY Claude v4.0.0 — Smart Code Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  /* ── Header ── */
  #header {
    height: 52px; padding: 0 20px; background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.5); z-index: 100; position: relative;
  }
  #header h1 { font-size: 17px; color: #00d4ff; white-space: nowrap; }
  .tab-bar { display: flex; gap: 6px; }
  .tab-btn {
    padding: 6px 16px; background: rgba(255,255,255,.08); border: none;
    color: #ccc; cursor: pointer; border-radius: 5px; font-size: 13px; font-weight: 500;
    transition: .2s;
  }
  .tab-btn:hover { background: rgba(255,255,255,.18); color: #fff; }
  .tab-btn.active { background: #00d4ff; color: #000; }

  /* ── Panels ── */
  .panel { display: none; width: 100%; height: calc(100vh - 52px); }
  .panel.active { display: flex; }

  /* Graph panel */
  #panel-graph { position: relative; }
  #graph { width: 100%; height: 100%; }
  .graph-legend {
    position: absolute; bottom: 16px; right: 16px;
    background: rgba(0,0,0,.82); padding: 12px 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.8;
  }
  .ldot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* List panels (duplicates + smells) */
  .list-panel { flex-direction: column; overflow: hidden; }
  .list-panel .toolbar {
    padding: 10px 20px; background: #16213e; display: flex; gap: 12px; align-items: center;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1; max-width: 500px; padding: 8px 12px; background: rgba(255,255,255,.08);
    border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 13px;
  }
  .search-input:focus { outline: none; border-color: #00d4ff; }
  .stat-chip {
    padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  }
  .stat-chip.exact { background: #e74c3c; }
  .stat-chip.near { background: #e67e22; }
  .stat-chip.crit { background: #e74c3c; }
  .stat-chip.warn { background: #f39c12; color: #111; }
  .stat-chip.info { background: #2ecc71; color: #111; }

  .list-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; }

  /* Duplicate group cards */
  .dup-group {
    margin: 12px 0; background: rgba(255,255,255,.04); border-radius: 8px;
    border-left: 4px solid #e74c3c; overflow: hidden;
  }
  .dup-group.near { border-left-color: #e67e22; }
  .dup-group-header {
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .dup-group-header:hover { background: rgba(255,255,255,.04); }
  .dup-type { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .dup-type.exact { color: #e74c3c; }
  .dup-type.near { color: #e67e22; }
  .dup-sim { color: #aaa; font-size: 12px; }
  .dup-funcs { padding: 0 14px 10px 14px; }
  .dup-func {
    display: flex; gap: 10px; padding: 4px 0; font-size: 13px; align-items: baseline;
  }
  .func-name { font-family: 'Cascadia Code', 'Fira Code', monospace; color: #00d4ff; font-weight: 600; min-width: 200px; }
  .func-file { color: #888; font-size: 12px; }
  .dup-merge { padding: 6px 14px 10px 14px; font-size: 12px; color: #f39c12; font-style: italic; }

  /* Smell table */
  .smell-table { width: 100%; border-collapse: collapse; }
  .smell-table th {
    position: sticky; top: 0; background: #16213e; padding: 10px 12px;
    text-align: left; font-size: 12px; font-weight: 600; cursor: pointer; user-select: none;
    border-bottom: 2px solid #0f3460;
  }
  .smell-table th:hover { background: #1a4d7a; }
  .smell-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.06); }
  .smell-table tr:hover { background: rgba(0,212,255,.08); }
  .sev-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .sev-badge.critical { background: #e74c3c; }
  .sev-badge.warning { background: #f39c12; color: #111; }
  .sev-badge.info { background: #2ecc71; color: #111; }
  .cat-cell { font-family: monospace; color: #00d4ff; }
  .msg-cell { color: #aaa; font-size: 12px; max-width: 350px; }
</style>
</head>
<body>

<div id="header">
  <h1>&#x1F50D; X-RAY Claude v4.0.0 — {self._root_name}</h1>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('graph')">&#x1F30D; Graph</button>
    <button class="tab-btn" onclick="showTab('dups')">&#x1F534; Duplicates</button>
    <button class="tab-btn" onclick="showTab('smells')">&#x1F9EA; Smells</button>
  </div>
</div>

<!-- ── Graph Panel ── -->
<div id="panel-graph" class="panel active" style="flex-direction: column;">
  <div class="toolbar" style="background: rgba(0,0,0,0.5); padding: 5px 20px;">
    <input class="search-input" id="graphSearch" placeholder="&#x1F50D; Filter graph by file name..." oninput="filterGraph()">
  </div>
  <div id="graph" style="flex:1;"></div>
  <div class="graph-legend">
    <div><span class="ldot" style="background:#2ecc71"></span>Healthy (1)</div>
    <div><span class="ldot" style="background:#f39c12"></span>Warnings (0)</div>
    <div><span class="ldot" style="background:#e74c3c"></span>Critical (1)</div>
    <div style="margin-top:6px;color:#e67e22;font-size:11px">--- Duplicate links ({len(self.edges)})</div>
    <div style="margin-top:8px;color:#666;font-size:11px">Scroll to zoom &middot; Drag to pan</div>
  </div>
</div>

<!-- ── Duplicates Panel ── -->
<div id="panel-dups" class="panel list-panel">
  <div class="toolbar">
    <input class="search-input" id="dupSearch" placeholder="&#x1F50D; Search function name or file..." oninput="filterDups()">
    <span class="stat-chip exact" id="dupExactChip"></span>
    <span class="stat-chip near" id="dupNearChip"></span>
  </div>
  <div class="list-scroll" id="dupList"></div>
</div>

<!-- ── Smells Panel ── -->
<div id="panel-smells" class="panel list-panel">
  <div class="toolbar">
    <input class="search-input" id="smellSearch" placeholder="&#x1F50D; Search name, file, category..." oninput="filterSmells()">
    <span class="stat-chip crit" id="smCritChip"></span>
    <span class="stat-chip warn" id="smWarnChip"></span>
    <span class="stat-chip info" id="smInfoChip"></span>
  </div>
  <div class="list-scroll" id="smellList">
    <table class="smell-table">
      <thead><tr>
        <th onclick="sortSmells(0)">Sev</th>
        <th onclick="sortSmells(1)">Category</th>
        <th onclick="sortSmells(2)">Name</th>
        <th onclick="sortSmells(3)">File</th>
        <th onclick="sortSmells(4)">Line</th>
        <th onclick="sortSmells(5)">Issue</th>
      </tr></thead>
      <tbody id="smellBody"></tbody>
    </table>
  </div>
</div>

<script>
// ── Data ──
const nodesData = [
  {
    "id": 1,
    "label": "test_xray_claude.py",
    "title": "<b>tests/test_xray_claude.py</b><br/>Functions: 115<br/><br/><b>Issues:</b><br/>  \ud83d\udd34 god-class: TestCodeSmellDetectorFunctions<br/>  \ud83d\udfe1 too-many-params: _make_func<br/>  \ud83d\udfe1 too-many-params: _make_class<br/>  \ud83d\udfe1 high-complexity: test_extract_from_temp_file<br/>  \ud83d\udfe1 long-function: test_end_to_end<br/>  ...+15 more",
    "color": "#e74c3c",
    "shape": "dot",
    "size": 40,
    "health": "critical",
    "full_path": "tests/test_xray_claude.py"
  },
  {
    "id": 2,
    "label": "x_ray_claude.py",
    "title": "<b>x_ray_claude.py</b><br/>Functions: 92",
    "color": "#2ecc71",
    "shape": "dot",
    "size": 40,
    "health": "healthy",
    "full_path": "x_ray_claude.py"
  }
];
const edgesData = [];
const dupData   = [];
const smellData = [{"sev": "critical", "cat": "god-class", "name": "TestCodeSmellDetectorFunctions", "file": "tests/test_xray_claude.py", "line": 259, "msg": "Class 'TestCodeSmellDetectorFunctions' has 18 methods (limit: 15)", "sug": "Split into smaller classes with single responsibility. Consider delegation or mixins."}, {"sev": "warning", "cat": "too-many-params", "name": "_make_func", "file": "tests/test_xray_claude.py", "line": 55, "msg": "Function '_make_func' has 13 parameters (limit: 6)", "sug": "Group related parameters into a dataclass or config object."}, {"sev": "warning", "cat": "too-many-params", "name": "_make_class", "file": "tests/test_xray_claude.py", "line": 83, "msg": "Function '_make_class' has 9 parameters (limit: 6)", "sug": "Group related parameters into a dataclass or config object."}, {"sev": "warning", "cat": "high-complexity", "name": "test_extract_from_temp_file", "file": "tests/test_xray_claude.py", "line": 743, "msg": "Function 'test_extract_from_temp_file' has cyclomatic complexity 12 (limit: 10)", "sug": "Simplify branching logic. Consider lookup tables or strategy pattern."}, {"sev": "warning", "cat": "long-function", "name": "test_end_to_end", "file": "tests/test_xray_claude.py", "line": 1010, "msg": "Function 'test_end_to_end' is 91 lines (limit: 60)", "sug": "Consider splitting into smaller functions."}, {"sev": "warning", "cat": "high-complexity", "name": "test_end_to_end", "file": "tests/test_xray_claude.py", "line": 1010, "msg": "Function 'test_end_to_end' has cyclomatic complexity 10 (limit: 10)", "sug": "Simplify branching logic. Consider lookup tables or strategy pattern."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestDuplicateFinder", "file": "tests/test_xray_claude.py", "line": 470, "msg": "Class 'TestDuplicateFinder' (114 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-docstring", "name": "test_exact_duplicates", "file": "tests/test_xray_claude.py", "line": 481, "msg": "Function 'test_exact_duplicates' (15 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestLibraryAdvisor", "file": "tests/test_xray_claude.py", "line": 590, "msg": "Class 'TestLibraryAdvisor' (56 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-docstring", "name": "test_suggestion_from_duplicate_group", "file": "tests/test_xray_claude.py", "line": 596, "msg": "Function 'test_suggestion_from_duplicate_group' (18 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestSmartGraph", "file": "tests/test_xray_claude.py", "line": 652, "msg": "Class 'TestSmartGraph' (84 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestASTExtraction", "file": "tests/test_xray_claude.py", "line": 742, "msg": "Class 'TestASTExtraction' (94 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-docstring", "name": "test_extract_from_temp_file", "file": "tests/test_xray_claude.py", "line": 743, "msg": "Function 'test_extract_from_temp_file' (40 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}, {"sev": "info", "cat": "missing-docstring", "name": "test_nesting_depth_calculation", "file": "tests/test_xray_claude.py", "line": 801, "msg": "Function 'test_nesting_depth_calculation' (15 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}, {"sev": "info", "cat": "missing-docstring", "name": "test_complexity_calculation", "file": "tests/test_xray_claude.py", "line": 817, "msg": "Function 'test_complexity_calculation' (19 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestReportPrinting", "file": "tests/test_xray_claude.py", "line": 898, "msg": "Class 'TestReportPrinting' (35 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestJSONReport", "file": "tests/test_xray_claude.py", "line": 939, "msg": "Class 'TestJSONReport' (64 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestFullPipeline", "file": "tests/test_xray_claude.py", "line": 1009, "msg": "Class 'TestFullPipeline' (92 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-class-docstring", "name": "TestEdgeCases", "file": "tests/test_xray_claude.py", "line": 1107, "msg": "Class 'TestEdgeCases' (93 lines) has no docstring", "sug": "Add a docstring explaining the class's responsibility."}, {"sev": "info", "cat": "missing-docstring", "name": "test_decorators_extracted", "file": "tests/test_xray_claude.py", "line": 1185, "msg": "Function 'test_decorators_extracted' (15 lines) has no docstring", "sug": "Add a docstring explaining purpose, parameters, and return value."}];

// ── Tab switching ──
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = {'graph':0,'dups':1,'smells':2}[name];
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
}

// ── Graph ──
const container = document.getElementById('graph');
const nodesDS = new vis.DataSet(nodesData);
const edgesDS = new vis.DataSet(edgesData);
const network = new vis.Network(container,
  { nodes: nodesDS, edges: edgesDS },
  {
    physics: { solver:'barnesHut', barnesHut:{ gravitationalConstant:-3000, springLength:150, damping:.3 } },
    interaction: { hover:true, tooltipDelay:100 },
    edges: { width:2, font:{ size:10, color:'#888' } },
  }
);

function filterGraph() {
  const q = document.getElementById('graphSearch').value.toLowerCase();
  const allNodes = nodesData;
  if (!q) {
    nodesDS.update(allNodes.map(n => ({id: n.id, hidden: false})));
    return;
  }
  const updates = allNodes.map(n => ({
    id: n.id,
    hidden: !(n.label.toLowerCase().includes(q) || (n.title && n.title.toLowerCase().includes(q)))
  }));
  nodesDS.update(updates);
}

// ── Duplicates list ──
const dupExact = dupData.filter(g => g.type==='exact').length;
const dupNear  = dupData.filter(g => g.type==='near').length;
document.getElementById('dupExactChip').textContent = dupExact + ' exact';
document.getElementById('dupNearChip').textContent  = dupNear + ' near';

function renderDups(data) {
  const el = document.getElementById('dupList');
  if (!data.length) { el.innerHTML = '<p style="padding:20px;color:#888">No duplicates match your search.</p>'; return; }
  let html = '';
  data.forEach(g => {
    const cls = g.type === 'near' ? 'near' : '';
    html += '<div class="dup-group ' + cls + '">';
    html += '<div class="dup-group-header">';
    html += '<span><span class="dup-type ' + g.type + '">' + g.type + '</span> &nbsp;Group #' + g.id + ' &mdash; ' + g.funcs.length + ' functions</span>';
    html += '<span class="dup-sim">' + g.sim + '% similar</span>';
    html += '</div>';
    html += '<div class="dup-funcs">';
    g.funcs.forEach(f => {
      html += '<div class="dup-func"><span class="func-name">' + f.name + '</span><span class="func-file">' + f.file + ':' + f.line + '</span></div>';
    });
    html += '</div>';
    if (g.merge) html += '<div class="dup-merge">&#x1F4A1; ' + g.merge + '</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}
renderDups(dupData);

function filterDups() {
  const q = document.getElementById('dupSearch').value.toLowerCase();
  if (!q) { renderDups(dupData); return; }
  renderDups(dupData.filter(g => g.funcs.some(f => f.name.toLowerCase().includes(q) || f.file.toLowerCase().includes(q))));
}

// ── Smells table ──
const smCrit = smellData.filter(s => s.sev==='critical').length;
const smWarn = smellData.filter(s => s.sev==='warning').length;
const smInfo = smellData.filter(s => s.sev==='info').length;
document.getElementById('smCritChip').textContent = smCrit + ' critical';
document.getElementById('smWarnChip').textContent = smWarn + ' warning';
document.getElementById('smInfoChip').textContent = smInfo + ' info';

let smellSorted = [...smellData];
const sevOrder = {'critical':0,'warning':1,'info':2};

function renderSmells(data) {
  const tbody = document.getElementById('smellBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" style="padding:20px;color:#888">No smells match.</td></tr>'; return; }
  tbody.innerHTML = data.map(s =>
    '<tr>' +
    '<td><span class="sev-badge ' + s.sev + '">' + s.sev + '</span></td>' +
    '<td class="cat-cell">' + s.cat + '</td>' +
    '<td style="font-weight:600">' + s.name + '</td>' +
    '<td style="color:#aaa;font-size:12px">' + s.file + '</td>' +
    '<td>' + s.line + '</td>' +
    '<td class="msg-cell">' + s.msg + '</td>' +
    '</tr>'
  ).join('');
}
renderSmells(smellSorted);

let smellSortDir = {};
function sortSmells(col) {
  const keys = ['sev','cat','name','file','line','msg'];
  const key = keys[col];
  const dir = smellSortDir[col] === 'asc' ? 'desc' : 'asc';
  smellSortDir = {}; smellSortDir[col] = dir;
  smellSorted.sort((a,b) => {
    let av = key==='sev' ? sevOrder[a.sev] : (key==='line' ? a.line : a[key].toLowerCase());
    let bv = key==='sev' ? sevOrder[b.sev] : (key==='line' ? b.line : b[key].toLowerCase());
    if (av < bv) return dir==='asc' ? -1 : 1;
    if (av > bv) return dir==='asc' ? 1 : -1;
    return 0;
  });
  renderSmells(smellSorted);
}

function filterSmells() {
  const q = document.getElementById('smellSearch').value.toLowerCase();
  if (!q) { renderSmells(smellSorted); return; }
  renderSmells(smellSorted.filter(s => s.name.toLowerCase().includes(q) || s.file.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q)));
}
</script>
</body>
</html>
