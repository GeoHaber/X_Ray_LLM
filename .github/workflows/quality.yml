name: Code Quality CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: ty type check (primary)
      run: |
        pip install ty
        ty check --output-format concise .
      continue-on-error: true

    - name: Pyright type check (legacy — will be removed)
      run: pyright .
      continue-on-error: true

    - name: pip-audit (dependency CVEs)
      run: pip-audit -r requirements.txt -r requirements-dev.txt

    - name: Bandit security lint
      run: bandit -r . -x ./venv,./.venv,./X_Ray_Rust_Full,tests/fixtures --severity-level medium
      continue-on-error: true

    - name: Run pytest tests
      run: python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: test-results.xml

  code-quality:
    runs-on: ubuntu-latest
    needs: tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run X-Ray self-scan
      run: |
        python -m xray . --format json -o x_ray_report.json

    - name: Run X-Ray SARIF output
      run: |
        python -m xray . --format sarif -o x_ray_report.sarif

    - name: Parse quality report
      run: |
        python .github/scripts/check_quality.py x_ray_report.json
      continue-on-error: true

    - name: Upload SARIF to GitHub
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: x_ray_report.sarif
      continue-on-error: true

    - name: Upload quality report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-report
        path: |
          x_ray_report.json
          x_ray_report.sarif

  # Optional: Fail if critical issues detected
  quality-gate:
    runs-on: ubuntu-latest
    needs: code-quality
    if: always()
    
    steps:
    - name: Download quality report
      uses: actions/download-artifact@v8
      with:
        name: code-quality-report
    
    - name: Check quality gate
      run: |
        if grep -q "CRITICAL:" quality-check.log 2>/dev/null; then
          echo "❌ Quality gate failed: Critical issues detected"
          cat quality-check.log
          exit 1
        else
          echo "✅ Quality gate passed"
        fi
