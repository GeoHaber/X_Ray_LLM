<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>X-RAY Code Graph Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

        body {

            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }
        #header {
            position: absolute;
            top: 15px; left: 15px; right: 15px;
            height: 60px;
            background: rgba(22, 27, 34, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            padding: 0 25px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 { margin: 0; font-size: 22px; color: #58a6ff; font-weight: 600; letter-spacing: -0.5px; }
        .search-box {
            margin-left: 30px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            width: 300px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.25); }
        .controls {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }
        select, button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:hover, button:hover { border-color: #8b949e; background: #1c2128; }
        #mynetwork { flex: 1; height: 100%; outline: none; }
        
        #sidebar {
            width: 400px;
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(16px);
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: absolute;
            right: 0; top: 0; bottom: 0;
            z-index: 90;
            box-shadow: -8px 0 24px rgba(0,0,0,0.6);
            padding: 25px;
            padding-top: 90px;
            overflow-y: auto;
        }
        #sidebar.open { transform: translateX(0); }
        .node-title { font-size: 24px; font-weight: 600; color: #ffffff; margin-bottom: 8px; word-break: break-all; line-height: 1.2; }
        .node-meta { font-size: 14px; color: #8b949e; margin-bottom: 20px; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-right: 8px; border: 1px solid;
        }
        .badge-healthy { color: #52c41a; border-color: rgba(82,196,26,0.3); background: rgba(82,196,26,0.1); }
        .badge-warning { color: #faad14; border-color: rgba(250,173,20,0.3); background: rgba(250,173,20,0.1); }
        .badge-critical { color: #ff4d4f; border-color: rgba(255,77,79,0.3); background: rgba(255,77,79,0.1); }
        
        .section-title { font-size: 12px; font-weight: 600; color: #58a6ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .node-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px; line-height: 1.5;
            background: #0d1117;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            color: #e6edf3;
            margin-bottom: 20px;
        }
        .issue-card {
            background: rgba(48, 54, 61, 0.5);
            border-left: 4px solid;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-top: 1px solid #30363d;
            border-right: 1px solid #30363d;
            border-bottom: 1px solid #30363d;
        }
        .issue-CRITICAL { border-left-color: #ff4d4f; }
        .issue-WARNING { border-left-color: #faad14; }
        .issue-INFO { border-left-color: #52c41a; }
        .issue-msg { font-size: 14px; color: #c9d1d9; margin-top: 6px; line-height: 1.4; }
        .close-btn { position: absolute; left: 25px; top: 90px; cursor: pointer; color: #8b949e; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); transition: background 0.2s; }
        .close-btn:hover { color: #ffffff; background: rgba(255,255,255,0.15); }
    </style>

t.urlopen(req, timeout=10) as r:\n            ok(r.status < 600, \"valid HTTP response\")\n    except urllib.error.HTTPError as e:\n        ok(e.code < 600, f\"valid HTTP (got {e.code})\")", "issues": [], "complexity": 2, "shape": "dot"}, {"id": "swarm/tests/browser_sim::t", "label": "t", "title": "t", "color": "#52c41a", "health": "healthy", "size": 10, "group": "swarm\\tests", "signature": "t()", "file": "swarm/tests/browser_sim.py", "line": 333, "code": "def t():\n    req = urllib.request.Request(BASE + \"/__swarm/inference\",\n                                 b\"this is not json at all <html>\",\n                                 headers={\"Content-Type\": \"application/json\"}, method=\"POST\")\n    try:\n        with urllib.request.urlopen(req, timeout=10) as r:\n            ok(r.status < 600, \"valid HTTP response\")\n    except urllib.error.HTTPError as e:\n        ok(e.code < 600, f\"valid HTTP (got {e.code})\")", "issues": [], "complexity": 2, "shape": "dot"}, {"id": "swarm/tests/test_chat_server::post_chat", "label": "post_chat", "title": "post_chat", "color": "#52c41a", "health": "healthy", "size": 21, "group": "swarm\\tests", "signature": "post_chat(message, badge, timeout)", "file": "swarm/tests/test_chat_server.py", "line": 39, "code": "def post_chat(message, badge=\"TEST-MONKEY\", timeout=30):\n    \"\"\"POST to /__chat, return (status_code, response_dict).\n\n    Returns (504, {\"error\": ...}) when the server takes too long\n    (CPU inference on large models can exceed the socket timeout).\n    \"\"\"\n    body = json.dumps({\"message\": message, \"badge\": badge}).encode()\n    req = urllib.request.Request(\n        f\"{BASE}/__chat\",\n        data=body,\n        headers={\"Content-Type\": \"application/json\"},\n        method=\"POST\",\n    )\n    try:\n        with urllib.request.urlopen(req, timeout=timeout) as resp:\n            return resp.status, json.loads(resp.read())\n    except urllib.error.HTTPError as e:\n        return e.code, json. _requests_all_succeed()", "file": "swarm/tests/test_chat_server.py", "line": 283, "code": "    def test_concurrent_requests_all_succeed(self):\n        \"\"\"10 sequential rapid requests \u2014 no 500s, no DB corruption.\"\"\"\n        import threading\n\n        results = []\n        errors = []\n        lock = threading.Lock()\n\n        def fire(i):\n            try:\n                code, body = post_chat(f\"concurrent test {i}\", badge=f\"CONC-{i:02d}\")\n                with lock:\n                    results.append((i, code, body))\n            except Exception as exc:\n                with lock:\n                    errors.append((i, str(exc)))\n\n        threads = [threading.Thread(target=fire, args=(i,)) for i in range(10)]\n        for t in threads:\n            t.start()\n        for t in threads:\n            t.join(timeout=60)\n\n        assert not errors, f\"Thread errors: {errors}\"\n        assert len(results) == 10, f\"Only {len(results)}/10 threads completed\"\n        for i, code, body in results:\n            assert code in (200, 400, 503, 504), f\"Thread {i} got unexpected {code}: {body}\"", "issues": [], "complexity": 9, "shape": "dot"}, {"id": "swarm/tests/test_runall::api", "label": "api", "title": "api", "color": "#52c41a", "health": "healthy", "size": 22, "group": "swarm\\tests", "signature": "api(method, path, body)", "file": "swarm/tests/test_runall.py", "line": 17, "code": "def api(method, path, body=None):\n    url = BASE + path\n    data = json.dumps(body).encode() if body else None\n    headers = {\"Content-Type\": \"application/json\"} if body else {}\n    req = urllib.request.Request(url, data=data, headers=headers, method=method)\n    try:\n        with urllib.request.urlopen(req, timeout=120) as resp:\n            text = resp.read().decode()\n            try:\n                return {\"status\": resp.status, \"data\": json.loads(text)}\n            except json.JSONDecodeError:\n                return {\"status\": resp.status, \"data\": text}\n    except urllib.error.HTTPError as e:\n        text = e.read().decode() if e.fp else \"\"\n        try:\n            return {\"status\": e.code, \"data\": json.loads(text)}\n        except:\n            return {\"status\": e.code, \"data\": text}\n    except socket.timeout as e:\n        return {\"status\": 0, \"data\": f\"timeout: {e}\"}\n    except Exception as e:\n        return {\"status\": 0, \"data\": str(e)}", "issues": [], "complexity": 8, "shape": "dot"}, {"id": "path:swarm/tests/test_runall.py", "label": "test_runall.py", "color": "#334155", "size": 20, "shape": "box", "font": {"color": "white"}}, {"id": "swarm/tests/test_runall::rand_model", "label": "rand_model", "title": "rand_model", "color": "#52c41a", "health": "healthy", "size": 10, "group": "swarm\\tests", "signature": "rand_model()", "file": "swarm/tests/test_runall.py", "line": 50, "code": "def rand_model():\n    if not models:\n        return \"test.gguf\"\n    m = random.choice(models)\n    return m.get(\"path\", m) if isinstance(m, dict) else m", "issues": [], "complexity": 1, "shape": "dot"}, {"id": "swarm/tests/test_runall::rand_models", "label": "rand_models", "title": "rand_models", "color": "#52c41a", "health": "healthy", "size": 10, "group": "swarm\\tests", "signature": "rand_models(n)", "file": "swarm/tests/test_runall.py", "line": 56, "code": "def rand_models(n):\n    if not models:\n        return [\"a.gguf\", \"b.gguf\"]\n    picked = random.sample(models, min(n, len(models)))\n    return [m.get(\"path\", m) if isinstance(m, dict) else m for m in picked]", "issues": [], "complexity": 2, "shape": "dot"}, {"id": "swarm/tests/test_runall::rand_cat", "label": "rand_cat", "title": "rand_cat", "color": "#52c41a", "health": "healthy", "size": 10, "group": "swarm\\tests", "signature": "rand_cat()", "file": "swarm/tests/test_runall.py", "line": 62, "code": "def rand_cat():\n    return random.choice(CATEGORIES)", "issues": [], "complexity": 0, "shape": "dot"}, {"id": "swarm/tes             barnesHut: { gravitationalConstant: -30000, springConstant: 0.005, springLength: 150 }
        };
        var hierarchicalOptions = { enabled: true, sortMethod: 'directed', nodeSpacing: 150, treeSpacing: 250, direction: 'DU' };
        
        var network = new vis.Network(container, data, {...baseOptions, physics: forcePhysics});
        
        // Mode Toggle
        document.getElementById('modeSelect').addEventListener('change', function(e) {
            var mode = e.target.value;
            nodes.clear();
            edges.clear();
            nodes.add(allDatasets[mode].nodes);
            edges.add(allDatasets[mode].edges);
            if (mode === 'hierarchy' && document.getElementById('layoutSelect').value !== 'hierarchical') {
                document.getElementById('layoutSelect').value = 'hierarchical';
                network.setOptions({ layout: { hierarchical: hierarchicalOptions }, physics: false });
            } else if (mode === 'complete' && document.getElementById('layoutSelect').value === 'hierarchical') {
                document.getElementById('layoutSelect').value = 'force';
                network.setOptions({ layout: { hierarchical: false }, physics: forcePhysics });
            }
            document.getElementById('searchInput').value = '';
            sidebar.classList.remove('open');
        });

        // Setup Search
        document.getElementById('searchInput').addEventListener('input', function(e) {
            var term = e.target.value.toLowerCase();
            if (!term) {
                nodes.forEach(n => nodes.update({id: n.id, hidden: false}));
                edges.forEach(e => edges.update({id: e.id, hidden: false}));
                return;
            }
            var matched = new Set();
            nodes.forEach(n => {
                var match = (n.label && n.label.toLowerCase().includes(term)) || (n.file && n.file.toLowerCase().includes(term));
                if (match) matched.add(n.id);
            });
            nodes.forEach(n => nodes.update({id: n.id, hidden: !matched.has(n.id)}));
            edges.forEach(e => edges.update({id: e.id, hidden: !matched.has(e.from) || !matched.has(e.to)}));
        });
        
        // Layout Toggle
        document.getElementById('layoutSelect').addEventListener('change', function(e) {
            if (e.target.value === 'hierarchical') {
                network.setOptions({ layout: { hierarchical: hierarchicalOptions }, physics: false });
            } else {
                network.setOptions({ layout: { hierarchical: false }, physics: forcePhysics });
            }
        });
        
        // Sidebar logic
        var sidebar = document.getElementById('sidebar');
        document.getElementById('closeSidebar').onclick = () => sidebar.classList.remove('open');
        
        network.on("selectNode", function (params) {
            var nodeId = params.nodes[0];
            var node = nodes.get(nodeId);
            if (!node || node.id === 'root' || node.id.startsWith('path:')) return;
            
            sidebar.classList.add('open');
            document.getElementById('sb-title').textContent = node.label;
            
            var badges = document.getElementById('sb-badges');
            badges.innerHTML = '';
            if (node.health) {
                badges.innerHTML += `<span class="badge badge-${node.health}">${node.health.toUpperCase()}</span>`;
            }
            if (node.complexity) {
                badges.innerHTML += `<span class="badge" style="color:#8b949e; border-color:#30363d; background:transparent;">Cx: ${node.complexity}</span>`;
            }

            var metaText = node.file ? `${node.file} | Line ${node.line}` : 'No file info';
            document.getElementById('sb-meta').textContent = metaText;
            document.getElementById('sb-details').style.display = 'block';
            document.getElementById('sb-sig').textContent = node.signature || node.label;
            document.getElementById('sb-code').textContent = node.code || '// Source unavailable';
            
            var issuesDiv = document.getElementById('sb-issues');
            issuesDiv.innerHTML = '';
            var issuesTitle = document.getElementById('sb-issues-title');
            if (node.issues && node.issues.length > 0) {
                issuesTitle.style.display = 'block';
                node.issues.forEach(iss => {
                    var d = document.createElement('div');
                    d.className = `issue-card issue-${iss.severity}`;
                    d.innerHTML = `<strong style="color:#c9d1d9;font-size:12px;letter-spacing:0.5px;">${iss.severity}</strong><div class="issue-msg">${iss.category}: ${iss.message}</div>`;
                    issuesDiv.appendChild(d);
                });
            } else {
                issuesTitle.style.display = 'none';
            }
        });
        network.on("deselectNode", function () {
            sidebar.classList.remove('open');
        });
    </script>
</body>
</html>
