<html lang="en">

<meta charset="UTF-8">

<style>
  :root {
    --bg:       #0d1117;
    --bg2:      #161b22;
    --bg3:      #21262d;
    --border:   #30363d;
    --accent:   #58a6ff;
    --accent2:  #79c0ff;
    --text:     #c9d1d9;
    --text-dim: #8b949e;
    --crit:     #f85149;
    --warn:     #d29922;
    --ok:       #3fb950;
    --dup-near: #e67e22;
    --radius:   8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden;
  }

  /* ── Header ── */
  #header {
    height:56px; padding:0 20px;
    background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    position:relative; z-index:100;
  }
  #header h1 { font-size:15px; color:var(--accent); white-space:nowrap; font-weight:600; }
  #header h1 small { color:var(--text-dim); font-weight:400; font-size:12px; }

  /* ── Tab bar ── */
  .tab-bar { display:flex; gap:4px; }
  .tab-btn {
    padding:6px 14px; background:transparent; border:1px solid transparent;
    color:var(--text-dim); cursor:pointer; border-radius:6px; font-size:13px;
    transition:all .15s; outline:none;
  }
  .tab-btn:hover { background:var(--bg3); color:var(--text); border-color:var(--border); }
  .tab-btn.active { background:var(--accent); color:#000; font-weight:600; border-color:var(--accent); }
  .tab-btn .kbd-hint {
    display:inline-block; margin-left:5px; padding:0 4px;
    background:rgba(0,0,0,.35); border-radius:3px; font-size:10px; font-weight:700;
  }

  /* header right cluster */
  .hdr-right { display:flex; gap:8px; align-items:center; }
  .hdr-btn {
    padding:5px 11px; background:var(--bg3); border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; border-radius:6px; font-size:12px;
    transition:all .15s;
  }
  .hdr-btn:hover { color:var(--text); border-color:var(--accent); }

  /* ── Panels ── */
  .panel { display:none; width:100%; height:calc(100vh - 56px); }
  .panel.active { display:flex; }

  /* Graph panel */
  #panel-graph { position:relative; }
  #graph { width:100%; height:100%; }
  .graph-legend {
    position:absolute; bottom:16px; right:16px;
    background:rgba(13,17,23,.92); border:1px solid var(--border);
    padding:12px 16px; border-radius:var(--radius); font-size:12px; line-height:2;
  }
  .ldot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:7px; vertical-align:middle; }
  #graph-search {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:var(--bg2); border:1px solid var(--border); border-radius:20px;
    padding:6px 16px; color:var(--text); font-size:13px; width:280px; outline:none;
    transition:border-color .15s;
  }
  #graph-search:focus { border-color:var(--accent); }

  /* ── List panels ── */
  .list-panel { flex-direction:column; overflow:hidden; }
  .toolbar {
    padding:10px 20px; background:var(--bg2); border-bottom:1px solid var(--border);
    display:flex; gap:10px; align-items:center; flex-shrink:0;
  }
  .search-input {
    flex:1; max-width:480px; padding:7px 12px;
    background:var(--bg3); border:1px solid var(--border);
    border-radius:6px; color:var(--text); font-size:13px; outline:none;
    transition:border-color .15s;
  }
  .search-input:focus { border-color:var(--accent); }
  .toolbar-right { margin-left:auto; display:flex; gap:6px; }
  .stat-chip {
    padding:3px 9px; border-radius:10px; font-size:11px; font-weight:700;
    cursor:pointer; transition:opacity .15s;
  }
  .stat-chip:hover { opacity:.8; }
  .stat-chip.exact { background:var(--crit); }
  .stat-chip.near  { background:var(--dup-near); }
  .stat-chip.crit  { background:var(--crit); }
  .stat-chip.warn  { background:var(--warn); color:#111; }
  .stat-chip.info  { background:var(--ok);  color:#111; }
  .stat-chip.inactive { opacity:.4; }

  .list-scroll { flex:1; overflow-y:auto; padding:0 20px 20px; scroll-behavior:smooth; }
  .empty-state {
    padding:60px 0; text-align:center; color:var(--text-dim); font-size:14px;
  }
  .empty-state .empty-icon { font-size:40px; display:block; margin-bottom:10px; }

  /* ── Duplicate group cards ── */
  .dup-group {
    margin:10px 0; background:var(--bg2); border-radius:var(--radius);
    border:1px solid var(--border); border-left:4px solid var(--crit); overflow:hidden;
    transition:border-color .15s;
  }
  .dup-group:hover { border-color:var(--accent); border-left-color:var(--crit); }
  .dup-group.near  { border-left-color:var(--dup-near); }
  .dup-group.near:hover { border-left-color:var(--dup-near); }
  .dup-group-header {
    padding:10px 14px; display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; user-select:none;
  }
  .dup-group-header:hover { background:rgba(255,255,255,.03); }
  .dup-type { font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.8px; }
  .dup-type.exact { color:var(--crit); }
  .dup-type.near  { color:var(--dup-near); }
  .dup-sim { color:var(--text-dim); font-size:12px; }
  .dup-body { padding:0 14px 10px; display:none; }
  .dup-body.open { display:block; }
  .dup-func {
    display:flex; gap:10px; padding:5px 0; font-size:13px; align-items:center;
    border-bottom:1px solid var(--border);
  }
  .dup-func:last-child { border-bottom:none; }
  .func-name {
    font-family:'Cascadia Code','Fira Code',monospace; color:var(--accent2);
    font-weight:600; min-width:180px;
  }
  .func-file { color:var(--text-dim); font-size:12px; flex:1; }
  .copy-btn {
    padding:2px 7px; background:var(--bg3); border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; border-radius:4px; font-size:10px;
    transition:all .1s; flex-shrink:0;
  }
  .copy-btn:hover { color:var(--accent); border-color:var(--accent); }
  .dup-merge {
    padding:8px 14px; font-size:12px; color:var(--warn); font-style:italic;
    background:rgba(210,153,34,.06); border-top:1px solid var(--border);
  }

  /* ── Smells table ── */
  .smell-table { width:100%; border-collapse:collapse; }
  .smell-table th {
    position:sticky; top:0; background:var(--bg2); padding:9px 12px;
    text-align:left; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; cursor:pointer; user-select:none;
    border-bottom:2px solid var(--border); color:var(--text-dim);
  }
  .smell-table th:hover { color:var(--text); }
  .smell-table th.sort-asc::after  { content:' ↑'; color:var(--accent); }
  .smell-table th.sort-desc::after { content:' ↓'; color:var(--accent); }
  .smell-table td { padding:8px 12px; font-size:13px; border-bottom:1px solid rgba(48,54,61,.8); vertical-align:top; }
  .smell-table tr:hover td { background:rgba(88,166,255,.05); }
  .sev-badge {
    display:inline-block; padding:2px 7px; border-radius:8px;
    font-size:10px; font-weight:700; text-transform:uppercase; white-space:nowrap;
  }
  .sev-badge.critical { background:var(--crit); }
  .sev-badge.warning  { background:var(--warn); color:#111; }
  .sev-badge.info     { background:var(--ok);   color:#111; }
  .cat-cell  { font-family:monospace; color:var(--accent); font-size:12px; }
  .name-cell { font-weight:600; }
  .file-cell { color:var(--text-dim); font-size:12px; }
  .msg-cell  { color:var(--text-dim); font-size:12px; max-width:320px; }
  .sug-cell  { color:#79c0ff; font-size:11px; font-style:italic; max-width:300px; }

  /* Export bar */
  .export-bar {
    padding:6px 20px; background:var(--bg2); border-top:1px solid var(--border);
    display:flex; gap:8px; align-items:center; font-size:12px; color:var(--text-dim);
    flex-shrink:0;
  }
  .export-btn {
    padding:4px 10px; background:var(--bg3); border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; border-radius:5px; font-size:11px; transition:all .15s;
  }
  .export-btn:hover { color:var(--accent); border-color:var(--accent); }

  /* Toast notification */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px);
    background:var(--bg3); border:1px solid var(--accent); color:var(--text);
    padding:8px 18px; border-radius:20px; font-size:13px;
    transition:transform .25s ease; z-index:9999; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }
</style>
</head>

<div id="header">
  <h1>&#x1F50D; X-RAY Claude <small>v4.0.0</small> &mdash; X_Ray</h1>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('graph')"  title="Press 1">&#x1F30D; Graph<span class="kbd-hint">1</span></button>
    <button class="tab-btn"        onclick="showTab('dups')"   title="Press 2">&#x1F534; Duplicates<span class="kbd-hint">2</span></button>
    <button class="tab-btn"        onclick="showTab('smells')" title="Press 3">&#x1F9EA; Smells<span class="kbd-hint">3</span></button>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="fitGraph()">&#x1F4CF; Fit</button>
    <button class="hdr-btn" onclick="exportCSV()">&#x2B07; CSV</button>
  </div>
</div>

<!-- ── Graph Panel ── -->
<div id="panel-graph" class="panel active">
  <div id="graph"></div>
  <input id="graph-search" placeholder="&#x1F50D; Highlight file..." oninput="highlightNode(this.value)">
  <div class="graph-legend">
    <div><span class="ldot" style="background:var(--ok)"></span>Healthy (93)</div>
    <div><span class="ldot" style="background:var(--warn)"></span>Warnings (28)</div>
    <div><span class="ldot" style="background:var(--crit)"></span>Critical (8)</div>
    <div style="margin-top:6px;color:var(--dup-near);font-size:11px">&#x2015; Duplicate links (26)</div>
    <div style="margin-top:8px;color:var(--text-dim);font-size:11px">Scroll=zoom &nbsp;&middot;&nbsp; Drag=pan &nbsp;&middot;&nbsp; Click=select</div>
  </div>
</div>

<!-- ── Duplicates Panel ── -->
<div id="panel-dups" class="panel list-panel">
  <div class="toolbar">
    <input class="search-input" id="dupSearch" placeholder="&#x1F50D; Search function or file..." oninput="debounceDups()">
    <span class="stat-chip exact" id="dupExactChip" onclick="toggleDupFilter('exact')" title="Toggle exact"></span>
    <span class="stat-chip near"  id="dupNearChip"  onclick="toggleDupFilter('near')"  title="Toggle near"></span>
  </div>
  <div class="list-scroll" id="dupList"></div>
</div>

<!-- ── Smells Panel ── -->
<div id="panel-smells" class="panel list-panel">
  <div class="toolbar">
    <input class="search-input" id="smellSearch" placeholder="&#x1F50D; Search name, file, category..." oninput="debounceSmells()">
    <span class="stat-chip crit" id="smCritChip" onclick="toggleSmellFilter('critical')" title="Toggle critical"></span>
    <span class="stat-chip warn" id="smWarnChip" onclick="toggleSmellFilter('warning')"  title="Toggle warnings"></span>
    <span class="stat-chip info" id="smInfoChip" onclick="toggleSmellFilter('info')"     title="Toggle info"></span>
  </div>
  <div class="list-scroll" id="smellList">
    <table class="smell-table">
      <thead><tr>
        <th id="th0" onclick="sortSmells(0)">Sev</th>
        <th id="th1" onclick="sortSmells(1)">Category</th>
        <th id="th2" onclick="sortSmells(2)">Name</th>
        <th id="th3" onclick="sortSmells(3)">File</th>
        <th id="th4" onclick="sortSmells(4)">Line</th>
        <th id="th5" onclick="sortSmells(5)">Issue</th>
        <th id="th6" onclick="sortSmells(6)">Fix</th>
      </tr></thead>
      <tbody id="smellBody"></tbody>
    </table>
  </div>
  <div class="export-bar">
    <span>&#x1F4CA; 245 issues</span>
    <button class="export-btn" onclick="exportSmellsCSV()">&#x2B07; Export CSV</button>
    <button class="export-btn" onclick="copySmellsJSON()">&#x1F4CB; Copy JSON</button>
  </div>
</div>

<div id="toast"></div>

//  UTILS

function esc(s) {
  // XSS-safe text → HTML conversion
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!'));
}

function debounce(fn, delay=220) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
}

// ═══════════════════════════════════════════
//  TAB SWITCHING  (keyboard: 1/2/3)
// ═══════════════════════════════════════════
const TABS = ['graph','dups','smells'];
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = TABS.indexOf(name);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (name === 'graph' && network) network.redraw();
}
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '1') showTab('graph');
  if (e.key === '2') showTab('dups');
  if (e.key === '3') showTab('smells');
});

// ═══════════════════════════════════════════
//  GRAPH  (vis-network)
// ═══════════════════════════════════════════
const nodeSet = new vis.DataSet(nodesData);
const edgeSet = new vis.DataSet(edgesData);
const network = new vis.Network(
  document.getElementById('graph'),
  { nodes: nodeSet, edges: edgeSet },
  {
    physics: {
      solver: 'barnesHut',
      barnesHut: { gravitationalConstant:-4000, springLength:170, damping:.35 },
      stabilization: { iterations:200 },
    },
    interaction: { hover:true, tooltipDelay:80, multiselect:true },
    edges: { width:2, selectionWidth:3, font:{ size:10, color:'#8b949e' }, smooth:{ type:'continuous' } },
    nodes: { borderWidth:2, borderWidthSelected:4 },
  }
);

// Click on a node → jump to smells for that file
network.on('click', params => {
  if (!params.nodes.length) return;
  const node = nodeSet.get(params.nodes[0]);
  if (!node) return;
  showTab('smells');
  document.getElementById('smellSearch').value = node.label;
  filterSmells();
});

function fitGraph() { network.fit({ animation: { duration:500 } }); }

function highlightNode(q) {
  const lower = q.toLowerCase();
  nodesData.forEach(n => {
    const match = q && n.label.toLowerCase().includes(lower);
    nodeSet.update({ id:n.id, borderColor: match ? '#fff' : n.color, borderWidth: match ? 4 : 2 });
  });
}

//  DUPLICATES
// ═══════════════════════════════════════════
const dupExactCount = dupData.filter(g => g.type==='exact').length;
const dupNearCount  = dupData.filter(g => g.type==='near').length;
document.getElementById('dupExactChip').textContent = dupExactCount + ' exact';
document.getElementById('dupNearChip').textContent  = dupNearCount  + ' near';

let dupFilters = new Set(['exact','near']);

function toggleDupFilter(type) {
  if (dupFilters.has(type)) dupFilters.delete(type); else dupFilters.add(type);
  document.getElementById('dupExactChip').classList.toggle('inactive', !dupFilters.has('exact'));
  document.getElementById('dupNearChip').classList.toggle('inactive',  !dupFilters.has('near'));
  applyDupFilter();
}

function applyDupFilter() {
  const q = document.getElementById('dupSearch').value.toLowerCase();
  const filtered = dupData.filter(g =>
    dupFilters.has(g.type) &&
    (!q || g.funcs.some(f => f.name.toLowerCase().includes(q) || f.file.toLowerCase().includes(q)))
  );
  renderDups(filtered);
}

const debounceDups = debounce(applyDupFilter);

function renderDups(data) {
  const el = document.getElementById('dupList');
  if (!data.length) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">&#x1F50D;</span>No duplicates match.</div>';
    return;
  }
  el.innerHTML = data.map(g => {
    const cls = g.type === 'near' ? 'near' : '';
    const funcsHtml = g.funcs.map(f =>
      '<div class="dup-func">' +
      '<span class="func-name">' + esc(f.name) + '</span>' +
      '<span class="func-file">' + esc(f.file) + ':' + f.line + '</span>' +
      '<button class="copy-btn" onclick="copyText(' + JSON.stringify(f.file+':'+f.line) + ')">&#x1F4CB;</button>' +
      '</div>'
    ).join('');
    const mergeHtml = g.merge
      ? '<div class="dup-merge">&#x1F4A1; ' + esc(g.merge) + '</div>'
      : '';
    return (
      '<div class="dup-group ' + cls + '">' +
      '<div class="dup-group-header" onclick="toggleDupBody(this)">' +
      '<span><span class="dup-type ' + g.type + '">' + g.type + '</span>&nbsp; Group #' + g.id + ' &mdash; ' + g.funcs.length + ' functions</span>' +
      '<span class="dup-sim">' + g.sim + '% similar &#x25BE;</span>' +
      '</div>' +
      '<div class="dup-body">' + funcsHtml + mergeHtml + '</div>' +
      '</div>'
    );
  }).join('');
}

function toggleDupBody(header) {
  header.nextElementSibling.classList.toggle('open');
}

renderDups(dupData);

// ═══════════════════════════════════════════
const smCrit = smellData.filter(s => s.sev==='critical').length;
const smWarn = smellData.filter(s => s.sev==='warning').length;
const smInfo = smellData.filter(s => s.sev==='info').length;
document.getElementById('smCritChip').textContent = smCrit + ' critical';
document.getElementById('smWarnChip').textContent = smWarn + ' warning';
document.getElementById('smInfoChip').textContent = smInfo + ' info';

let smellSorted  = [...smellData];
let smellFilters = new Set(['critical','warning','info']);
const sevOrder   = {'critical':0,'warning':1,'info':2};

function toggleSmellFilter(sev) {
  if (smellFilters.has(sev)) smellFilters.delete(sev); else smellFilters.add(sev);
  document.getElementById('smCritChip').classList.toggle('inactive', !smellFilters.has('critical'));
  document.getElementById('smWarnChip').classList.toggle('inactive', !smellFilters.has('warning'));
  document.getElementById('smInfoChip').classList.toggle('inactive', !smellFilters.has('info'));
  applySmellFilter();
}

function applySmellFilter() {
  const q = document.getElementById('smellSearch').value.toLowerCase();
  const filtered = smellSorted.filter(s =>
    smellFilters.has(s.sev) &&
    (!q || s.name.toLowerCase().includes(q) ||
           s.file.toLowerCase().includes(q) ||
           s.cat.toLowerCase().includes(q)  ||
           s.msg.toLowerCase().includes(q))
  );
  renderSmells(filtered);
}

const debounceSmells = debounce(applySmellFilter);
function filterSmells() { applySmellFilter(); }

function renderSmells(data) {
  const tbody = document.getElementById('smellBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--text-dim)">No smells match.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(s =>
    '<tr>' +
    '<td><span class="sev-badge ' + s.sev + '">' + esc(s.sev) + '</span></td>' +
    '<td class="cat-cell">'  + esc(s.cat)  + '</td>' +
    '<td class="name-cell">' + esc(s.name) + '</td>' +
    '<td class="file-cell">' + esc(s.file) + ':' + s.line + '</td>' +
    '<td>' + s.line + '</td>' +
    '<td class="msg-cell">'  + esc(s.msg)  + '</td>' +
    '<td class="sug-cell">'  + esc(s.sug || '') + '</td>' +
    '</tr>'
  ).join('');
}
renderSmells(smellSorted);

// Sort
let smellSortState = {};
function sortSmells(col) {
  const keys = ['sev','cat','name','file','line','msg','sug'];
  const key  = keys[col];
  const prev = smellSortState[col];
  const dir  = prev === 'asc' ? 'desc' : 'asc';
  smellSortState = {}; smellSortState[col] = dir;
  document.querySelectorAll('.smell-table th').forEach((th,i) => {
    th.className = i===col ? ('sort-' + dir) : '';
  });
  smellSorted.sort((a,b) => {
    let av = key==='sev' ? sevOrder[a.sev] : (key==='line' ? +a.line : String(a[key]||'').toLowerCase());
    let bv = key==='sev' ? sevOrder[b.sev] : (key==='line' ? +b.line : String(b[key]||'').toLowerCase());
    return (av < bv ? -1 : av > bv ? 1 : 0) * (dir==='asc' ? 1 : -1);
  });
  applySmellFilter();
}

// ═══════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════
function exportCSV() {
  // Export whichever panel is active
  const panel = document.querySelector('.panel.active').id;
  if (panel === 'panel-smells') exportSmellsCSV();
  else toast('Switch to the Smells tab to export CSV');
}

function exportSmellsCSV() {
  const headers = ['severity','category','name','file','line','message','suggestion'];
  const rows = smellData.map(s =>
    [s.sev,s.cat,s.name,s.file,s.line,s.msg,s.sug||''].map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')
  );
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'xray_smells.csv';
  a.click();
  toast('CSV downloaded');
}

function copySmellsJSON() {
  copyText(JSON.stringify(smellData, null, 2));
}
